DATASET: 'NuScenesDataset'
DATA_PATH: '../data/nuscenes'

VERSION: 'v1.0-trainval'
MAX_SWEEPS: 6

DATA_SPLIT: {
    'train': train,
    'test': val
}

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['placeholder']
    AUG_CONFIG_LIST:
        - NAME: gt_sampling
          DB_INFO_PATH:
              - nuscenes_dbinfos_6sweeps_withvelo.pkl
          PREPARE: {
             filter_by_min_points: [
                 'car:1', 'bicycle:1', 'pedestrian:1'
             ],
          }

          SAMPLE_GROUPS: [
              'car:6', 'pedestrian:2', 'bicycle:4'
          ]

          NUM_POINT_FEATURES: 7
          DATABASE_WITH_FAKELIDAR: False
          REMOVE_EXTRA_WIDTH: [0.0, 0.0, 0.0]
          LIMIT_WHOLE_SCENE: True

        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.3925, 0.3925]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.95, 1.05]


INFO_PATH: {
    'train': [nuscenes_infos_6sweeps_train.pkl],
    'test': [nuscenes_infos_6sweeps_val.pkl],
}



POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'rcs', 'vx_comp', 'vy_comp', 'timestamp'],
    src_feature_list: ['x', 'y', 'z','rcs', 'vx_comp', 'vy_comp', 'timestamp'],
}


DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': True
      }

    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.4, 0.4, 8.0]
      MAX_POINTS_PER_VOXEL: 20
      MAX_NUMBER_OF_VOXELS: {
        'train': 30000,
        'test': 30000
      }

POINT_CLOUD_RANGE: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
PRED_VELOCITY: True
